# docker-compose.prod.yml — production overrides
#
# Запуск на ВМ (Yandex Cloud):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Этот файл переопределяет только то, что отличается от локалки:
# - домен jaronimo.work.gd вместо :80
# - открывает порты 443 для HTTPS

services:
  caddy:
    environment:
      # Let's Encrypt автоматически выдаст сертификат для этого домена
      - SITE_ADDRESS=jaronimo.work.gd
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
