services:
  # 1. Reverse Proxy (Caddy)
  caddy:
    image: caddy:2-alpine
    container_name: app4every-caddy
    restart: unless-stopped
    environment:
      # Локалка: :80 (чистый HTTP, без TLS)
      # Прод:   заменяется в docker-compose.prod.yml на jaronimo.work.gd
      - SITE_ADDRESS=:80
    ports:
      - "80:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data    # здесь Caddy хранит сертификаты Let's Encrypt
      - caddy_config:/config
    depends_on:
      - auth-service
      - notebook-service
      - reviews-service
      - screenshare-service
      - watchparty-service
      - frontend
    networks:
      - app4every_network

  # 2. Go Backend (Authentication and Profile Management)
  auth-service:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
      target: dev
    container_name: app4every-auth
    restart: unless-stopped
    volumes:
      - ./services/auth:/app
      - /app/tmp
    environment:
      - APP_ENV=local
      - PORT=8080
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_SSLMODE=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - MASTER_INVITE_CODE=${MASTER_INVITE_CODE}
      - SHIKIMORI_CLIENT_ID=${SHIKIMORI_CLIENT_ID}
      - SHIKIMORI_CLIENT_SECRET=${SHIKIMORI_CLIENT_SECRET}
      - SHIKIMORI_REDIRECT_URI=${SHIKIMORI_REDIRECT_URI}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app4every_network

  # 3. Go Backend (Notes service)
  notebook-service:
    build:
      context: ./services/notebook
      dockerfile: Dockerfile
      target: dev
    container_name: app4every-notebook
    restart: unless-stopped
    volumes:
      - ./services/notebook:/app
      - /app/tmp
    environment:
      - PORT=8081
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_SSLMODE=disable
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app4every_network

  # 4. Go Backend (Reviews service — рецензии / список просмотренного)
  reviews-service:
    build:
      context: ./services/reviews
      dockerfile: Dockerfile
      target: dev
    container_name: app4every-reviews
    restart: unless-stopped
    volumes:
      - ./services/reviews:/app
      - /app/tmp
    environment:
      - PORT=8082
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_SSLMODE=disable
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app4every_network

  # 4b. Go Backend (Screensharing and Videochat service)
  screenshare-service:
    build:
      context: ./services/screenshare
      dockerfile: Dockerfile
      target: dev
    container_name: app4every-screenshare
    restart: unless-stopped
    volumes:
      - ./services/screenshare:/app
      - /app/tmp
    environment:
      - PORT=8083
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_SSLMODE=disable
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app4every_network

  # 4c. Go Backend (Watch Party service)
  watchparty-service:
    build:
      context: ./services/watchparty
      dockerfile: Dockerfile
      target: dev
    container_name: app4every-watchparty
    restart: unless-stopped
    volumes:
      - ./services/watchparty:/app
      - /app/tmp
    environment:
      - PORT=8084
      - JWT_SECRET=${JWT_SECRET}
      - AUTH_SERVICE_URL=http://auth-service:8080
    networks:
      - app4every_network

  # 5. Vue.js Frontend (dev mode)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: app4every_frontend
    restart: unless-stopped
    environment:
      - VITE_TMDB_API_KEY=${VITE_TMDB_API_KEY}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    networks:
      - app4every_network

  # 4. PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: app4every_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - app4every_network

  # 5. Redis
  redis:
    image: redis:7-alpine
    container_name: app4every_redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app4every_network

networks:
  app4every_network:
    driver: bridge

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  frontend_node_modules:
